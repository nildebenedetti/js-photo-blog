<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Blog</title>
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Edu+TAS+Beginner:wght@400..700&display=swap" rel="stylesheet">

        rel="stylesheet">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Giga:wght@100..900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- stylesheet -->
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/media-query.css">
</head>

<body>
    <!-- User message: Loading -->
    <div class="loading-content">
        <h1 class="loading-message">
            In caricamento...
        </h1>
    </div>

    <!-- User message: Error-->
    <div class="error-content d-none ">
        <h1 class="error-message">
            Errore nel caricamento del contenuto: ricarica la pagina
        </h1>
    </div>
    <!-- header -->
    <header class="blog-header header-font">
        <h1 class="gallery-title">
            Estate '24
        </h1>
    </header>
    <!-- main-->
    <main class="container-main d-flex">
        <!-- Card Container -->
        <div class="card-container d-flex">
            <!-- QUI inseriro' le mie card -->
        </div>
    </main>
    <!-- modale -->
    <div class="modal-container d-none">
        <div class="btn-carousel-prev">
            <i class="bi bi-arrow-left-short"></i>
        </div>
        <div class="modal">
            <img src="https://picsum.photos/id/237/200/300" alt="placeholder" class="modal-image">
            <div class="close-btn"> <i class="bi bi-x-circle"></i></div>
        </div>
        <div class="btn-carousel-nxt">
            <i class="bi bi-arrow-right-short"></i>
        </div>
    </div>

    <!-- btn per aggiungere form -->
    <div class="memory-btn-container d-flex">
        <button class="add-memory-btn btn-plain">
            Aggiungi Ricordo
        </button>
    </div>
    <!--form per aggiungere nuova memory-->
    <div class="new-memory-form-container d-none date-font">
        <div class="form-card">
            <form>
                <div class="field">
                    <label class="label" for="ricordo">Il mio ricordo</label>
                    <div class="control">
                        <input class="input" type="text" id="ricordo" name="ricordo"
                            placeholder="Un titolo per il tuo ricordo">
                    </div>
                </div>
                <div class="field">
                    <label class="label" for="data">Data</label>
                    <div class="control">
                        <input class="input" type="text" id="data" name="data" placeholder="gg-mm-aaaa">
                    </div>
                </div>
                <div class="field">
                    <label class="label" for="foto">Foto</label>
                    <div class="control">
                        <input class="input" type="file" id="foto" name="foto" accept="image/*">
                    </div>
                    <div class="form-thumbnail-container d-none">
                        <img id="anteprima" src="" alt="Anteprima della tua foto">
                    </div>
                </div>
                <div class="control btn-submit-container d-flex">
                    <button type="submit" class="btn-submit btn-plain">Salva Ricordo</button>
                </div>
            </form>
        </div>
    </div>
